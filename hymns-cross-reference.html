const LANG_KEYS = ['ENG','SPA','POR','FRE'];
const XREF_COLS = {ENG:'eng', SPA:'spa', POR:'por', FRE:'fre'};

// Pre-build lookup: for each lang+number, which xref rows contain it?
// xrefIndex[lang][number] = array of xref row indices
const xrefIndex = {};
LANG_KEYS.forEach(lang => {
  xrefIndex[lang] = {};
  const col = XREF_COLS[lang];
  XREF.forEach((row, i) => {
    const val = row[col];
    if (val && val !== '*') {
      if (!xrefIndex[lang][val]) xrefIndex[lang][val] = [];
      xrefIndex[lang][val].push(i);
    }
  });
});

function getXRefs(lang, num) {
  // Returns array of {lang, num, title} for cross-references excluding the source
  const rows = xrefIndex[lang][num] || [];
  const results = [];
  rows.forEach(i => {
    const row = XREF[i];
    LANG_KEYS.forEach(otherLang => {
      if (otherLang === lang) return;
      const val = row[XREF_COLS[otherLang]];
      if (val && val !== '*') {
        const title = HYMNS[otherLang][val];
        if (title) {
          // avoid duplicates
          if (!results.find(r => r.lang === otherLang && r.num === val)) {
            results.push({lang: otherLang, num: val, title});
          }
        }
      }
    });
  });
  return results;
}

function createCard(lang, num, title) {
  const xrefs = getXRefs(lang, num);
  const hasXrefs = xrefs.length > 0;

  const card = document.createElement('div');
  card.className = 'card';

  const header = document.createElement('div');
  header.className = 'card-header' + (hasXrefs ? ' clickable' : '');

  const badge = document.createElement('span');
  badge.className = 'lang-badge lang-' + lang;
  badge.textContent = lang;

  const number = document.createElement('span');
  number.className = 'card-number';
  number.textContent = num;

  const titleEl = document.createElement('span');
  titleEl.className = 'card-title';
  titleEl.textContent = title;

  header.appendChild(badge);
  header.appendChild(number);
  header.appendChild(titleEl);

  if (hasXrefs) {
    const tri = document.createElement('span');
    tri.className = 'triangle';
    tri.textContent = '▶';
    header.appendChild(tri);

    const xrefPanel = document.createElement('div');
    xrefPanel.className = 'card-xrefs';

    const xrefLabel = document.createElement('div');
    xrefLabel.className = 'xref-label';
    xrefLabel.textContent = 'Cross-references';
    xrefPanel.appendChild(xrefLabel);

    xrefs.forEach(xr => {
      const row = document.createElement('div');
      row.className = 'xref-row';

      const xBadge = document.createElement('span');
      xBadge.className = 'lang-badge lang-' + xr.lang;
      xBadge.textContent = xr.lang;

      const xNum = document.createElement('span');
      xNum.className = 'xref-number';
      xNum.textContent = xr.num;

      const xTitle = document.createElement('span');
      xTitle.className = 'xref-title';
      xTitle.textContent = xr.title;

      row.appendChild(xBadge);
      row.appendChild(xNum);
      row.appendChild(xTitle);
      xrefPanel.appendChild(row);
    });

    card.appendChild(header);
    card.appendChild(xrefPanel);

    header.addEventListener('click', () => {
      const open = xrefPanel.classList.toggle('open');
      tri.classList.toggle('open', open);
    });
  } else {
    card.appendChild(header);
  }

  return card;
}

function search(query) {
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';

  const q = query.trim();
  if (!q) return;

  const isNumeric = /^\d+$/.test(q);
  const cards = [];

  if (isNumeric) {
    // Exact number match across all languages
    LANG_KEYS.forEach(lang => {
      const title = HYMNS[lang][q];
      if (title) {
        cards.push(createCard(lang, q, title));
      }
    });
    // Also check French sub-numbers like 127a, 127b
    if (!cards.length || true) {
      // Already covered by exact key match above
    }
  } else {
    // Partial text match on titles (case-insensitive)
    const ql = q.toLowerCase();
    LANG_KEYS.forEach(lang => {
      Object.entries(HYMNS[lang]).forEach(([num, title]) => {
        if (title.toLowerCase().includes(ql)) {
          cards.push(createCard(lang, num, title));
        }
      });
    });
  }

  if (cards.length === 0) {
    const msg = document.createElement('div');
    msg.className = 'no-results';
    msg.textContent = 'No hymns found.';
    resultsEl.appendChild(msg);
  } else {
    cards.forEach(c => resultsEl.appendChild(c));
  }
}

let debounceTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => search(e.target.value), 200);
});
</script>
